<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>이걸왜몰랐지</title>
<style>
  :root{
    --bg: #0f1222;
    --page-bg: #f5f6fb;
    --card-bg: #ffffff;
    --accent: #5b6cff;
    --accent2: #8a5bff;
    --accent-soft: #eef0ff;
    --text: #1c1f2a;
    --sub: #767b8a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    background:var(--bg);
    display:flex;
    justify-content:center;
  }
  .app{
    width:100%;
    max-width:430px;
    min-height:100vh;
    background:var(--page-bg);
    position:relative;
    overflow-x:hidden;
    padding-bottom:90px;
  }

  /* ---- Hero header ---- */
  .hero{
    background:
      radial-gradient(120% 100% at 20% 0%, rgba(255,255,255,0.18), transparent 60%),
      linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    padding:16px 20px 34px;
    border-radius:0 0 28px 28px;
    position:relative;
    color:#fff;
  }
  .hero::after{
    content:"";
    position:absolute;left:0;right:0;bottom:-1px;height:34px;
    background:var(--page-bg);
    border-radius:24px 24px 0 0;
  }
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .icon-btn{
    width:34px;height:34px;border-radius:50%;
    background:rgba(255,255,255,0.18);
    display:flex;align-items:center;justify-content:center;
    font-size:15px;cursor:pointer;border:none;color:#fff;
    backdrop-filter:blur(4px);
  }
  .disclosure{
    margin-top:14px;
    background:rgba(255,255,255,0.14);
    border:1px solid rgba(255,255,255,0.25);
    color:#fff;
    font-size:10.5px;
    text-align:center;
    padding:7px 12px;
    line-height:1.5;
    border-radius:10px;
  }
  .profile{
    text-align:center;
    margin-top:18px;
    position:relative;
    z-index:2;
  }
  .avatar{
    width:78px;height:78px;border-radius:24px;
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 12px;
    box-shadow:0 8px 20px rgba(20,10,60,0.25);
    animation:pop .5s cubic-bezier(.34,1.56,.64,1) both;
  }
  .avatar svg{width:42px;height:42px;}
  .name{
    font-size:20px;font-weight:800;margin:0 0 4px;
    text-shadow:0 2px 8px rgba(0,0,0,0.15);
  }
  .tagline{font-size:12.5px;opacity:0.9;margin-bottom:14px;}
  .biz-btn{
    display:inline-flex;align-items:center;gap:6px;
    border:1px solid rgba(255,255,255,0.5);background:rgba(255,255,255,0.12);
    padding:7px 16px;border-radius:20px;color:#fff;
    font-size:12.5px;cursor:pointer;
    text-decoration:none;
  }

  /* ---- Search (floats over hero curve) ---- */
  .search-card{
    margin:-20px 20px 0;
    position:relative;
    z-index:3;
    background:#fff;
    border-radius:16px;
    box-shadow:0 10px 24px rgba(30,20,90,0.12);
    padding:4px;
  }
  .search-input{
    width:100%;padding:13px 14px;border-radius:13px;
    border:none;background:transparent;font-size:14.5px;color:var(--text);
  }
  .search-input:focus{outline:none;}
  .search-input::placeholder{color:#aab0c2;}

  .hint{
    text-align:center;font-size:12px;color:var(--sub);
    margin:14px 20px 0;line-height:1.6;
  }

  .section-title{
    display:flex;align-items:baseline;gap:6px;
    font-weight:800;font-size:16px;
    margin:18px 20px 12px;
    color:var(--text);
  }
  .section-title span{font-weight:500;font-size:12px;color:var(--sub);}

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    padding:0 20px;
  }
  .card{
    background:var(--card-bg);
    border-radius:18px;
    overflow:hidden;
    text-decoration:none;color:inherit;
    box-shadow:0 4px 14px rgba(30,20,90,0.06);
    border:1px solid #f0f1f7;
    display:block;
    opacity:0;
    animation:rise .45s ease forwards;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .card:active{transform:scale(0.96);}
  .card-img-wrap{
    position:relative;
    width:100%;aspect-ratio:1/1;
    background:linear-gradient(135deg,var(--accent-soft),#dfe4ff);
    display:flex;align-items:center;justify-content:center;
    font-size:38px;
    overflow:hidden;
  }
  .card-img-wrap img{
    width:100%;height:100%;object-fit:cover;
  }
  .rank-badge{
    position:absolute;top:8px;left:8px;
    min-width:22px;height:22px;padding:0 6px;
    border-radius:8px;
    background:rgba(20,20,30,0.75);
    color:#fff;font-size:11px;font-weight:800;
    display:flex;align-items:center;justify-content:center;
  }
  .card-body{padding:11px 12px 13px;}
  .card-title{font-size:13.5px;font-weight:700;margin:0 0 4px;line-height:1.35;color:var(--text);}
  .card-desc{font-size:11.5px;color:var(--sub);margin:0 0 8px;line-height:1.4;}
  .card-cta{
    display:inline-flex;align-items:center;gap:4px;
    font-size:11.5px;font-weight:700;color:var(--accent);
  }

  .empty{
    text-align:center;color:#999;font-size:14px;padding:50px 0;display:none;
  }

  /* ---- Fake bottom app nav for mobile-app feel ---- */
  .bottom-nav{
    position:fixed;left:50%;bottom:14px;transform:translateX(-50%);
    width:calc(100% - 40px);max-width:390px;
    background:rgba(20,20,35,0.92);
    backdrop-filter:blur(10px);
    border-radius:20px;
    display:flex;justify-content:space-around;align-items:center;
    padding:10px 0;
    box-shadow:0 10px 26px rgba(0,0,0,0.25);
    z-index:10;
  }
  .nav-item{
    display:flex;flex-direction:column;align-items:center;gap:3px;
    color:rgba(255,255,255,0.55);font-size:9.5px;
    background:none;border:none;
  }
  .nav-item.active{color:#fff;}
  .nav-item .ic{font-size:17px;}

  @keyframes rise{
    from{opacity:0;transform:translateY(14px);}
    to{opacity:1;transform:translateY(0);}
  }
  @keyframes pop{
    from{opacity:0;transform:scale(.6);}
    to{opacity:1;transform:scale(1);}
  }
  .card:nth-child(1){animation-delay:.02s;}
  .card:nth-child(2){animation-delay:.07s;}
  .card:nth-child(3){animation-delay:.12s;}
  .card:nth-child(4){animation-delay:.17s;}
  .card:nth-child(5){animation-delay:.22s;}
  .card:nth-child(6){animation-delay:.27s;}
</style>
</head>
<body>
<div class="app">

  <div class="hero">
    <div class="topbar">
      <button class="icon-btn">&#8592;</button>
      <button class="icon-btn">&#128276;</button>
    </div>
    <div class="disclosure">
      이 페이지의 일부 링크는 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.
    </div>
    <div class="profile">
      <div class="avatar">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M32 6C22.6 6 15 13.6 15 23c0 6.2 3.3 10.4 6.3 13.8 1.6 1.8 2.7 3.6 2.7 5.7v2h16v-2c0-2.1 1.1-3.9 2.7-5.7C45.7 33.4 49 29.2 49 23 49 13.6 41.4 6 32 6Z" stroke="#1c1f2a" stroke-width="3" stroke-linejoin="round"/>
          <path d="M24 50h16M26 56h12" stroke="#1c1f2a" stroke-width="3" stroke-linecap="round"/>
          <path d="M27 28c-1.5-1.5-1.5-4 0-5.5s4-1.5 5.5 0" stroke="#1c1f2a" stroke-width="3" stroke-linecap="round"/>
          <circle cx="32" cy="34" r="1.8" fill="#1c1f2a"/>
          <path d="M20 15c0-3 2-6 5-7" stroke="#1c1f2a" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
          <g transform="translate(38,32) rotate(20)">
            <path d="M0 4a4 4 0 0 1 4-4h9l9 9-9 9-9-9V4Z" fill="#5b6cff" stroke="#1c1f2a" stroke-width="2" stroke-linejoin="round"/>
            <circle cx="5" cy="4" r="1.6" fill="#fff"/>
          </g>
        </svg>
      </div>
      <div class="name">이걸왜몰랐지</div>
      <div class="tagline">써보고 진짜 좋은 것만 올립니다</div>
      <a class="biz-btn" href="mailto:lnag2180@gmail.com">&#9993; 비즈니스 제안</a>
    </div>
  </div>

  <div class="search-card">
    <input id="search" class="search-input" placeholder="🔍 제품명 또는 번호로 검색해보세요">
  </div>

  <div class="hint">
    👆 짧게 입력해도 모두 뜹니다! 궁금한 제품을 검색해보세요 👆
  </div>

  <div class="section-title">🔥 지금 뜨는 꿀템 <span id="count"></span></div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty">검색 결과가 없어요 🔍</div>
</div>

<div class="bottom-nav">
  <button class="nav-item active"><span class="ic">🏠</span>홈</button>
  <button class="nav-item" id="navSearch"><span class="ic">🔍</span>검색</button>
  <button class="nav-item"><span class="ic">🤍</span>찜</button>
</div>

<script>
  // 제품을 추가하려면 이 배열 맨 앞에 새 객체를 추가하세요 (번호는 자동 내림차순 표시)
  // img: 실제 상품 사진 경로 (없으면 emoji로 대체 표시)
  const products = [
    {
      id: 3,
      name: "위니쿨 급속냉각 목선풍기",
      desc: "대용량 5200mAh 휴대용 넥 선풍기",
      emoji: "🧊",
      img: "assets/product-3.jpg",
      link: "https://link.coupang.com/a/e9F7T1eUou"
    },
    {
      id: 2,
      name: "청사과 왁뿌볼",
      desc: "말랑쫀득 촉감 스트레스 해소볼",
      emoji: "🍏",
      img: "assets/product-2.jpg",
      link: "https://link.coupang.com/a/e85K6lMVoG"
    },
    {
      id: 1,
      name: "풀페이스 스노클링 마스크",
      desc: "코+입으로 편하게 숨쉬는 마스크",
      emoji: "🤿",
      img: "assets/product-1.jpg",
      link: "https://link.coupang.com/a/e8YSXGdIlg"
    }
  ];

  const grid = document.getElementById('grid');
  const emptyMsg = document.getElementById('empty');
  const searchInput = document.getElementById('search');
  const countEl = document.getElementById('count');

  function sorted() {
    return [...products].sort((a, b) => b.id - a.id);
  }

  function render(list) {
    grid.innerHTML = '';
    countEl.textContent = list.length ? `(${list.length})` : '';
    if (list.length === 0) {
      emptyMsg.style.display = 'block';
      return;
    }
    emptyMsg.style.display = 'none';
    list.forEach((p, i) => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = p.link;
      a.target = '_blank';
      a.rel = 'noopener sponsored';
      const media = p.img
        ? `<img src="${p.img}" alt="${p.name}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'img-fallback',textContent:'${p.emoji || '🛍️'}'}))">`
        : (p.emoji || '🛍️');
      a.innerHTML = `
        <div class="card-img-wrap">
          <span class="rank-badge">NO.${p.id}</span>
          ${media}
        </div>
        <div class="card-body">
          <p class="card-title">${p.name}</p>
          <p class="card-desc">${p.desc}</p>
          <span class="card-cta">보러가기 →</span>
        </div>
      `;
      grid.appendChild(a);
    });
  }

  render(sorted());

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) { render(sorted()); return; }
    render(sorted().filter(p => p.name.toLowerCase().includes(q) || String(p.id).includes(q)));
  });

  document.getElementById('navSearch').addEventListener('click', () => {
    searchInput.focus();
    searchInput.scrollIntoView({behavior:'smooth', block:'center'});
  });
</script>
</body>
</html>
