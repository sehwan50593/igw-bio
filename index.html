<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이걸왜몰랐지</title>
<style>
  :root{
    --bg: #eef1f7;
    --card-bg: #ffffff;
    --accent: #4a6cf7;
    --accent-soft: #e7ecff;
    --text: #1c1f2a;
    --sub: #767b8a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    background:var(--bg);
    display:flex;
    justify-content:center;
  }
  .page{
    width:100%;
    max-width:430px;
    background:var(--card-bg);
    min-height:100vh;
    padding-bottom:60px;
  }
  .disclosure{
    background:#fff4d6;
    color:#7a5b00;
    font-size:11.5px;
    text-align:center;
    padding:8px 16px;
    line-height:1.5;
  }
  .inner{padding:20px 20px 0;}
  .topbar{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
  }
  .icon-btn{
    width:36px;height:36px;border-radius:50%;
    background:rgba(0,0,0,0.05);
    display:flex;align-items:center;justify-content:center;
    font-size:16px;cursor:pointer;border:none;
  }
  .profile{
    text-align:center;
    margin-top:8px;
  }
  .avatar{
    width:84px;height:84px;border-radius:22px;
    background:var(--accent-soft);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 12px;
    box-shadow:0 4px 10px rgba(74,108,247,0.15);
  }
  .avatar svg{width:46px;height:46px;}
  .name{
    font-size:21px;font-weight:800;margin:4px 0 14px;color:var(--text);
  }
  .biz-btn{
    display:inline-flex;align-items:center;gap:6px;
    border:1px solid #dcdfe8;background:#fff;
    padding:8px 16px;border-radius:20px;
    font-size:13px;color:#333;cursor:pointer;
  }
  .search-wrap{margin:22px 0 10px;}
  .search-input{
    width:100%;padding:14px 16px;border-radius:14px;
    border:1px solid #e6e8ef;background:#f7f8fc;font-size:15px;
  }
  .search-input:focus{outline:2px solid var(--accent);}
  .hint{
    text-align:center;font-size:13px;color:var(--sub);
    margin:16px 0;line-height:1.6;
  }
  .divider{text-align:center;color:#ccc;margin:18px 0;letter-spacing:4px;}
  .contact{
    text-align:center;font-size:14px;color:#333;
    margin:10px 0 20px;
  }
  .section-title{
    text-align:center;font-weight:700;font-size:15px;
    margin:20px 0 14px;
    color:var(--text);
  }
  .list{
    display:flex;
    flex-direction:column;
    gap:10px;
    padding:0 20px;
  }
  .item{
    display:flex;
    align-items:center;
    gap:12px;
    background:#f7f8fc;
    border:1px solid #eceef4;
    border-radius:14px;
    padding:10px;
    text-decoration:none;
    color:inherit;
  }
  .item:active{background:var(--accent-soft);}
  .item-img{
    width:56px;height:56px;border-radius:12px;flex:none;
    background:var(--accent-soft);
    display:flex;align-items:center;justify-content:center;
    font-size:26px;
  }
  .item-body{flex:1;min-width:0;}
  .item-title{font-size:14px;font-weight:700;margin:0 0 3px;color:var(--text);}
  .item-desc{font-size:12px;color:var(--sub);margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .item-arrow{color:var(--sub);font-size:16px;flex:none;}
  .empty{
    text-align:center;color:#999;font-size:14px;padding:40px 0;display:none;
  }
</style>
</head>
<body>
<div class="page">
  <div class="disclosure">
    이 페이지의 일부 링크는 쿠팡 파트너스 활동의 일환으로,<br>이에 따른 일정액의 수수료를 제공받을 수 있습니다.
  </div>

  <div class="inner">
    <div class="topbar">
      <button class="icon-btn">&#8593;</button>
      <button class="icon-btn">&#128276;</button>
    </div>

    <div class="profile">
      <div class="avatar">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M32 6C22.6 6 15 13.6 15 23c0 6.2 3.3 10.4 6.3 13.8 1.6 1.8 2.7 3.6 2.7 5.7v2h16v-2c0-2.1 1.1-3.9 2.7-5.7C45.7 33.4 49 29.2 49 23 49 13.6 41.4 6 32 6Z" stroke="#1c1f2a" stroke-width="3" stroke-linejoin="round"/>
          <path d="M24 50h16M26 56h12" stroke="#1c1f2a" stroke-width="3" stroke-linecap="round"/>
          <path d="M27 28c-1.5-1.5-1.5-4 0-5.5s4-1.5 5.5 0" stroke="#1c1f2a" stroke-width="3" stroke-linecap="round"/>
          <circle cx="32" cy="34" r="1.8" fill="#1c1f2a"/>
          <path d="M20 15c0-3 2-6 5-7" stroke="#1c1f2a" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
          <g transform="translate(38,32) rotate(20)">
            <path d="M0 4a4 4 0 0 1 4-4h9l9 9-9 9-9-9V4Z" fill="#4a6cf7" stroke="#1c1f2a" stroke-width="2" stroke-linejoin="round"/>
            <circle cx="5" cy="4" r="1.6" fill="#fff"/>
          </g>
        </svg>
      </div>
      <div class="name">이걸왜몰랐지</div>
      <button class="biz-btn">&#9993; 비즈니스 제안</button>
    </div>

    <div class="search-wrap">
      <input id="search" class="search-input" placeholder="검색어를 입력해주세요.">
    </div>

    <div class="hint">
      👆찾으시는 제품명 or 제품번호를 검색해보세요!👆<br>
      짧게 입력해도 모두 뜹니다!
    </div>

    <div class="divider">•••</div>
    <div class="contact">✉️ 문의: lnag2180@gmail.com</div>
    <div class="divider">•••</div>

    <div class="section-title">🔥이걸왜몰랐지 꿀템🔥</div>
  </div>

  <div class="list" id="grid"></div>
  <div class="empty" id="empty">검색 결과가 없어요 🔍</div>
</div>

<script>
  // 제품을 추가하려면 이 배열 맨 앞에 새 객체를 추가하세요 (번호는 자동 내림차순 표시)
  const products = [
    {
      id: 1,
      name: "풀페이스 스노클링 마스크",
      desc: "코+입으로 편하게 숨쉬는 마스크",
      emoji: "🤿",
      link: "https://link.coupang.com/YOUR_PARTNER_LINK_HERE"
    }
  ];

  const grid = document.getElementById('grid');
  const emptyMsg = document.getElementById('empty');
  const searchInput = document.getElementById('search');

  function render(list) {
    grid.innerHTML = '';
    if (list.length === 0) {
      emptyMsg.style.display = 'block';
      return;
    }
    emptyMsg.style.display = 'none';
    list.forEach(p => {
      const a = document.createElement('a');
      a.className = 'item';
      a.href = p.link;
      a.target = '_blank';
      a.rel = 'noopener sponsored';
      a.innerHTML = `
        <div class="item-img">${p.emoji}</div>
        <div class="item-body">
          <p class="item-title">${p.id}. ${p.name}</p>
          <p class="item-desc">${p.desc}</p>
        </div>
        <div class="item-arrow">›</div>
      `;
      grid.appendChild(a);
    });
  }

  function sorted() {
    return [...products].sort((a, b) => b.id - a.id);
  }

  render(sorted());

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) { render(sorted()); return; }
    const filtered = sorted().filter(p =>
      p.name.toLowerCase().includes(q) || String(p.id).includes(q)
    );
    render(filtered);
  });
</script>
</body>
</html>
